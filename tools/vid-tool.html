<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIYOS Video Tool | Converter & VID Player</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --container-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --accent-color: #2e7d32;
            --accent-hover: #388e3c;
            --border-color: #444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 960px;
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 顶部导航区域样式 */
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .btn-secondary {
            background-color: #444;
            color: var(--text-color);
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #555;
        }

        .user-indicator {
            font-size: 0.9rem;
            color: #aaa;
        }

        h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="file"], input[type="number"] {
            background-color: #3d3d3d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            cursor: pointer;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 10px;
        }

        progress {
            width: 100%;
            height: 15px;
            accent-color: var(--accent-color);
        }

        .status-text {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
        }

        /* 播放器区域样式 */
        .player-canvas-container {
            background-color: #000;
            border: 1px solid var(--border-color);
            width: 640px;
            height: 160px;
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 10px 0;
        }

        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        .player-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .info-text {
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body id="toolBody" style="display: none;">

<div class="container">
    
    <!-- 顶部导航条（新增返回按键与用户名称展示） -->
    <div class="tool-header">
        <button class="btn-secondary" onclick="location.href='../index.html'">← 返回主页</button>
        <span class="user-indicator" id="userIndicator">加载中...</span>
    </div>

    <div class="grid-layout">
        
        <!-- 转换器区域 -->
        <div class="section">
            <h2>===== VIDEO CONVERTER =====</h2>
            
            <div class="form-group">
                <label for="videoInput">Select Input Video:</label>
                <input type="file" id="videoInput" accept="video/*">
            </div>

            <div class="form-group">
                <label for="fpsInput">Target Frame Rate (FPS):</label>
                <input type="number" id="fpsInput" value="30" min="1" max="120" style="width: 80px;">
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="flipH" checked> Horizontal Flip
                </label>
                <label>
                    <input type="checkbox" id="flipV" checked> Vertical Flip
                </label>
            </div>

            <button id="convertBtn" onclick="startConversion()">Start Conversion</button>

            <div class="progress-container">
                <progress id="convertProgress" value="0" max="100"></progress>
                <div id="statusText" class="status-text">Status: Idle</div>
            </div>
        </div>

        <!-- 播放器区域 -->
        <div class="section">
            <h2>===== VID PLAYER =====</h2>
            
            <div class="form-group">
                <label for="vidInput">Open .VID File:</label>
                <input type="file" id="vidInput" accept=".vid">
            </div>

            <div class="player-canvas-container">
                <canvas id="playerCanvas" width="320" height="80"></canvas>
            </div>

            <div class="player-controls">
                <button id="playBtn" onclick="togglePlay()" disabled>Play</button>
                <span id="frameCountText" class="info-text">Total Frames: 0</span>
            </div>
            <div id="currentFrameText" class="status-text">Current Frame: 0 / 0</div>
        </div>

    </div>
</div>

<script>
    // ====== 【安全验证拦截器】 ======
    (async function checkAuth() {
        const token = localStorage.getItem('userToken');
        
        if (!token) {
            alert("未检测到登录凭证，请先登录！");
            window.location.href = '../login.html';
            return;
        }

        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const result = await response.json();

            if (response.ok && result.valid) {
                // 验证成功，显示网页，并更新顶部用户名
                document.getElementById('toolBody').style.display = 'flex';
                document.getElementById('userIndicator').innerText = `当前用户: ${result.username}`;
                console.log(`验证成功，欢迎: ${result.username}`);
            } else {
                alert("您的登录凭证已失效，请重新登录！");
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userToken');
                window.location.href = '../login.html';
            }
        } catch (err) {
            alert("无法连接到验证服务器，请检查网络！");
            window.location.href = '../login.html';
        }
    })();
    // ===============================================

    const WIDTH = 320;
    const HEIGHT = 80;
    const FRAME_SIZE = WIDTH * HEIGHT;

    // --- 转换相关变量 ---
    let converting = false;

    async function startConversion() {
        if (converting) return;

        const videoInput = document.getElementById('videoInput');
        if (videoInput.files.length === 0) {
            alert("Please select a video file first.");
            return;
        }

        const file = videoInput.files[0];
        const fps = parseFloat(document.getElementById('fpsInput').value) || 30;
        const flipH = document.getElementById('flipH').checked;
        const flipV = document.getElementById('flipV').checked;

        const convertBtn = document.getElementById('convertBtn');
        const progressBar = document.getElementById('convertProgress');
        const statusText = document.getElementById('statusText');

        converting = true;
        convertBtn.disabled = true;
        statusText.innerText = "Initializing video...";

        const video = document.createElement('video');
        video.src = URL.createObjectURL(file);
        video.muted = true;
        video.playsInline = true;

        try {
            await new Promise((resolve, reject) => {
                video.onloadedmetadata = resolve;
                video.onerror = () => reject(new Error("Failed to load video."));
            });

            const duration = video.duration;
            const interval = 1 / fps;
            const totalFrames = Math.floor(duration * fps);

            progressBar.max = totalFrames;
            progressBar.value = 0;

            const canvas = document.createElement('canvas');
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            const ctx = canvas.getContext('2d');

            const chunks = [];
            let currentFrame = 0;

            video.currentTime = 0;

            const seekAndCapture = () => {
                return new Promise((resolve) => {
                    const onSeeked = () => {
                        video.removeEventListener('seeked', onSeeked);
                        
                        ctx.clearRect(0, 0, WIDTH, HEIGHT);
                        ctx.save();
                        
                        let scaleX = flipH ? -1 : 1;
                        let scaleY = flipV ? -1 : 1;
                        let posX = flipH ? -WIDTH : 0;
                        let posY = flipV ? -HEIGHT : 0;
                        
                        ctx.scale(scaleX, scaleY);
                        ctx.drawImage(video, posX, posY, WIDTH, HEIGHT);
                        ctx.restore();

                        const imgData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
                        const data = imgData.data;
                        const grayFrame = new Uint8Array(FRAME_SIZE);

                        for (let i = 0; i < FRAME_SIZE; i++) {
                            const r = data[i * 4];
                            const g = data[i * 4 + 1];
                            const b = data[i * 4 + 2];
                            const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                            grayFrame[i] = Math.round(gray);
                        }

                        chunks.push(grayFrame);
                        currentFrame++;
                        progressBar.value = currentFrame;
                        statusText.innerText = `Processing: ${currentFrame} / ${totalFrames} frames`;

                        resolve();
                    };
                    video.addEventListener('seeked', onSeeked);
                });
            };

            for (let i = 0; i < totalFrames; i++) {
                video.currentTime = i * interval;
                await seekAndCapture();
            }

            const outputBuffer = new Uint8Array(chunks.length * FRAME_SIZE);
            let offset = 0;
            for (const chunk of chunks) {
                outputBuffer.set(chunk, offset);
                offset += chunk.length;
            }

            const blob = new Blob([outputBuffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name.substring(0, file.name.lastIndexOf('.')) + '.vid';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            statusText.innerText = "Conversion completed and file downloaded.";
        } catch (err) {
            alert("Error during conversion: " + err.message);
            statusText.innerText = "Conversion failed.";
        } finally {
            converting = false;
            convertBtn.disabled = false;
            URL.revokeObjectURL(video.src);
        }
    }

    // --- 播放器相关变量 ---
    let vidData = null;
    let totalFrames = 0;
    let currentIdx = 0;
    let isPlaying = false;
    let playTimer = null;
    const FRAME_INTERVAL = 80;

    const playerCanvas = document.getElementById('playerCanvas');
    const playerCtx = playerCanvas.getContext('2d');
    const playBtn = document.getElementById('playBtn');
    const frameCountText = document.getElementById('frameCountText');
    const currentFrameText = document.getElementById('currentFrameText');

    document.getElementById('vidInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        stopPlay();

        const reader = new FileReader();
        reader.onload = function(evt) {
            vidData = new Uint8Array(evt.target.result);
            totalFrames = Math.floor(vidData.length / FRAME_SIZE);
            currentIdx = 0;

            frameCountText.innerText = `Total Frames: ${totalFrames}`;
            playBtn.disabled = totalFrames === 0;
            
            refreshPlayerFrame();
        };
        reader.readAsArrayBuffer(file);
    });

    function refreshPlayerFrame() {
        if (!vidData || totalFrames === 0) return;

        if (currentIdx >= totalFrames) {
            currentIdx = 0;
        }

        const start = currentIdx * FRAME_SIZE;
        const frameBytes = vidData.subarray(start, start + FRAME_SIZE);

        const imgData = playerCtx.createImageData(WIDTH, HEIGHT);
        const data = imgData.data;

        for (let i = 0; i < FRAME_SIZE; i++) {
            const gray = frameBytes[i];
            const idx = i * 4;
            data[idx] = gray;
            data[idx + 1] = gray;
            data[idx + 2] = gray;
            data[idx + 3] = 255;
        }

        playerCtx.putImageData(imgData, 0, 0);
        currentFrameText.innerText = `Current Frame: ${currentIdx + 1} / ${totalFrames}`;
    }

    function playLoop() {
        if (!isPlaying) return;
        currentIdx = (currentIdx + 1) % totalFrames;
        refreshPlayerFrame();
        playTimer = setTimeout(playLoop, FRAME_INTERVAL);
    }

    function togglePlay() {
        if (!vidData || totalFrames === 0) return;

        isPlaying = !isPlaying;
        if (isPlaying) {
            playBtn.innerText = "Pause";
            playLoop();
        } else {
            stopPlay();
        }
    }

    function stopPlay() {
        isPlaying = false;
        playBtn.innerText = "Play";
        if (playTimer) {
            clearTimeout(playTimer);
            playTimer = null;
        }
    }
</script>

</body>
</html>
