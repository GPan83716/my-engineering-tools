<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册账号</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .register-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: var(--container-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .form-group label { margin-bottom: 5px; }
        .form-group input {
            padding: 8px;
            background-color: #333;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
        }
        .message {
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2 style="margin-top:0; text-align: center;">注册新账号</h2>
    
    <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    
    <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="doRegister()">注册</button>
    
    <div id="msg" class="message"></div>
    
    <p style="text-align: center; margin-top: 15px;">
        已有账号？<a href="login.html" style="color: var(--accent-color); text-decoration: none;">去登录</a>
    </p>
</div>

<script>
    async function doRegister() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const msgDiv = document.getElementById('msg');

        if(!u || !p) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "用户名或密码不能为空";
            return;
        }

        try {
            // 向后端发送注册请求
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await response.json();

            if (response.ok) {
                msgDiv.style.color = "lightgreen";
                msgDiv.innerText = "注册成功！3秒后跳转登录页...";
                setTimeout(() => {
                    location.href = 'login.html';
                }, 2000);
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = data.message || "注册失败";
            }
        } catch (err) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "无法连接到服务器";
        }
    }
</script>

</body>
</html>
